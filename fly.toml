# fly.toml app configuration file generated for frontend-rough-cloud-3819 on 2026-03-09T02:11:13-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'frontend-rough-cloud-3819'
primary_region = 'ewr'

[build]
  dockerfile = 'Dockerfile'

[env]
  DATABASE_PATH = '/data/assets.db'
  DATA_DIR = '/data'
  FLASK_ENV = 'production'
  PORT = '8080'

[[mounts]]
  source = 'assets_data'
  destination = '/data'
  initial_size = '1gb'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '30s'
    method = 'GET'
    path = '/api/assets'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
